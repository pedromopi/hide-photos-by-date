name: PhotoHider
options:
  bundleIdPrefix: com.generic
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 16.0

targets:
  PhotoHider:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: PhotoManager
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.generic.photohider
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Hide Photos
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Photo Manager uses photo library access to count media and move selected items to Hidden.
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: Photo Manager uses this permission to apply hiding changes to selected items.
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
